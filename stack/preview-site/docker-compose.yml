# Template for a preview site with its own tailnet hostname.
# Spun up per-site by `gnar-preview-site <name> <dir>`, which copies this
# file (and Caddyfile) into /srv/preview-sites/<name>/ and runs:
#
#     docker compose -p preview-<name> --env-file .env up -d
#
# The pattern: each preview site is its own tailscale node. No tags,
# no ACL edits, no svc:foo — just a normal user-owned device. Auth key
# is single-use OK (the node persists state under ./data/tailscale).

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: gnar-preview-${NAME}-tailscale
    hostname: ${NAME}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: ${NAME}
      TS_STATE_DIR: /var/lib/tailscale
      TS_EXTRA_ARGS: "--ssh"
    volumes:
      - ./data/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  # Static file server in the tailscale netns. `tailscale serve` runs
  # auto-TLS for this node's hostname, proxying to caddy on :80.
  serve:
    image: caddy:latest
    container_name: gnar-preview-${NAME}-serve
    network_mode: service:tailscale
    depends_on: [tailscale]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${SITE_DIR}:/srv/site:ro
    restart: unless-stopped

  # Wires up `tailscale serve` so the node's MagicDNS name terminates
  # TLS and proxies to caddy. One-shot — exits after configuring serve.
  serve-config:
    image: tailscale/tailscale:latest
    container_name: gnar-preview-${NAME}-serve-config
    network_mode: service:tailscale
    depends_on: [tailscale, serve]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Wait for tailscaled to be reachable, then point serve at caddy.
        for i in $$(seq 1 30); do
          tailscale status >/dev/null 2>&1 && break
          sleep 2
        done
        tailscale serve --bg --https 443 http://127.0.0.1:80
    restart: "no"
