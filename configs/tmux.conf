# GNAR - Tmux Configuration

set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 10000
set -g focus-events on

# Prefix
set -g prefix C-a
bind C-a send-prefix

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style splits
bind v split-window -h
bind s split-window -v

# Status bar
set -g status-style bg=black,fg=white
set -g status-left '#[fg=green]#S '
set -g status-right '#[fg=yellow]#H #[fg=cyan]%H:%M'

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Index from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Default shell. tmux does NOT shell-expand $(...) inside its own commands,
# so `set -g default-shell "$(command -v zsh)"` would set the shell to the
# literal string "$(command -v zsh)" and tmux refuses with "not a suitable
# shell". Just hardcode the Arch path.
set -g default-shell /usr/bin/zsh
