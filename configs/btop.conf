#? Config file for btop v. 1.x

# GNAR — btop is the top pane of the kiosk dashboard. By default btop
# paints its own panel background, an off-black grey that clashed with
# the true-black (foot #000000) status panes below it. theme_background
# = False makes btop transparent to the terminal background instead, so
# the whole dashboard sits on one consistent black.
theme_background = False

# 24-bit colour for smooth graph gradients.
truecolor = True
