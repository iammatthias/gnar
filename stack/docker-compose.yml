# Cap container log growth — json-file defaults to unbounded. Applied to
# every service below via `logging: *default-logging`. Takes effect per
# container on its next recreate.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Network ingress. Owns the tailnet identity. Other services share its
  # network namespace so they reach the tailnet directly + can proxy to
  # one another via localhost.
  tailscale:
    image: tailscale/tailscale:latest
    container_name: gnar-tailscale
    logging: *default-logging
    hostname: ${TS_HOSTNAME:-gnar}
    environment:
      # Set in .env (copy from .env.example) for unattended bring-up:
      #   TS_AUTHKEY=tskey-auth-...
      # Or leave unset and run `docker compose exec tailscale tailscale up` once.
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: ${TS_HOSTNAME:-gnar}
      TS_STATE_DIR: /var/lib/tailscale
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---ssh}
    volumes:
      - ./data/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # `extra_hosts` MUST live on the netns owner. Sibling containers
    # using `network_mode: service:tailscale` share /etc/hosts, so this
    # propagates automatically.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Published host ports also MUST live on the netns owner — sibling
    # containers can't publish their own. 8642 is the Hermes OpenAI-compatible
    # API server (run by hermes-gateway; enable via API_SERVER_* in
    # data/hermes/.env). Reachable on the LAN at http://<host>:8642 for
    # non-tailnet clients (e.g. an ESP32 dashboard). Docker's publish bypasses
    # UFW, so the API_SERVER_KEY bearer token is the access control.
    ports:
      - "8642:8642"
    restart: unless-stopped

  # Reverse proxy for everything served from the box. Edits to ./Caddyfile
  # take effect with `docker compose exec caddy caddy reload`.
  caddy:
    # Custom build — adds the caddy-dns/cloudflare module so caddy can
    # do ACME DNS-01 against Cloudflare (required for LE wildcard certs
    # on *.$PREVIEW_APEX).
    build:
      context: ./caddy
      dockerfile: Dockerfile
    image: gnar-caddy:latest
    container_name: gnar-caddy
    logging: *default-logging
    network_mode: service:tailscale
    depends_on: [tailscale]
    environment:
      # Caddy substitutes {$PREVIEW_APEX} and {env.CF_API_TOKEN} in the
      # Caddyfile at config-load / cert-issuance time. Defaults mirror
      # .env.example so the file still parses if .env hasn't been
      # customized yet.
      PREVIEW_APEX: ${PREVIEW_APEX:-previews.example.com}
      CF_API_TOKEN: ${CF_API_TOKEN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
      # Static "online" homepage served at the preview apex.
      - ./homepage:/srv/homepage:ro
      # Project files — so `add-preview-site hello /srv/projects/foo`
      # can serve straight out of the project's own dir without copying.
      - /srv/projects:/srv/projects:ro
      # Per-preview caddy fragments — one .caddy file per preview,
      # written by `add-preview-site` and imported into the wildcard
      # HTTPS block at config-load time.
      - ./preview-handles:/etc/caddy/preview-handles:ro
    # host.docker.internal resolution comes from the tailscale service
    # — containers sharing its netns inherit /etc/hosts.
    restart: unless-stopped

  # Hermes orchestrator: Telegram bot + agent brain. Calls the bundled
  # `claude` and `chainlink` binaries inside this container.
  hermes-gateway:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    image: gnar-hermes:latest
    container_name: gnar-hermes-gateway
    logging: *default-logging
    network_mode: service:tailscale
    depends_on: [tailscale]
    command: ["hermes", "gateway", "run"]
    volumes:
      # Persistent ~/.hermes (auth.json, MEMORY.md, kanban.db, sessions).
      - ./data/hermes:/root/.hermes
      # Persistent ~/.claude (subscription auth, project session transcripts).
      - ./data/claude:/root/.claude
      # Backup target for the nightly `hermes backup` cron. Kept OUTSIDE
      # ~/.hermes so a full backup (which zips ~/.hermes) doesn't nest the
      # previous archives. Written by ~/.hermes/scripts/backup.sh.
      - ./data/backups:/root/backups
      # Skills shipped with the repo, mounted read-only so updates land via
      # `git pull && docker compose restart hermes-gateway`.
      - ./skills:/root/.hermes/skills/gnar:ro
      # Project files. Same path on host + container so paths match what
      # the user (and the rest of gnar — `gnar-deploy`, `cdp`, etc.) uses.
      - /home/iam/projects:/home/iam/projects:rw
      # gnar helper scripts (gnar-deploy, gnar-project-init, gnar-preview-site,
      # ...). Mounted read-only so `git pull` on the host immediately reflects
      # inside the container; PATH is prepended below.
      - ${USER_HOME:-/root}/gnar/bin:/opt/gnar-bin:ro
      # So the agent can `docker ps` etc. on the host docker.
      - /var/run/docker.sock:/var/run/docker.sock
      # Git/SSH: share the host user's SSH keys so `git push` over SSH
      # works as the gnar user. .ssh is a DIRECTORY so a bind-mount is
      # fine; .gitconfig has to live elsewhere because single-file binds
      # break rename() (git + gh write by rename).
      # USER_HOME is set in .env by setup.sh — without it $HOME would
      # be /root when compose runs from the gnar-stack systemd unit.
      - ${USER_HOME:-/root}/.ssh:/root/.ssh:ro
      # gh CLI auth + cloudflared cert (created by interactive `gh auth login`
      # / `cloudflared tunnel login` from inside the container). Both persist
      # across rebuilds via this bind mount.
      - ./data/agent-tools:/root/.config
    # host.docker.internal inherited from the tailscale service via netns.
    environment:
      # Point git's "global config" at the persisted .config directory
      # (mounted from ./data/agent-tools). gh and git both write here;
      # no single-file bind mount, so rename() works.
      GIT_CONFIG_GLOBAL: /root/.config/git/config
      # gnar-deploy and friends look here for project checkouts. $HOME is
      # /root inside the container, but the bind-mount lives at /home/iam.
      GNAR_PROJECTS: /home/iam/projects
      # Prepend the bind-mounted gnar bin so `gnar-deploy` etc. are on PATH.
      PATH: /opt/gnar-bin:/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    restart: unless-stopped

  # Web UI for the kanban board + session inspector.
  hermes-dashboard:
    image: gnar-hermes:latest
    container_name: gnar-hermes-dashboard
    logging: *default-logging
    network_mode: service:tailscale
    depends_on: [tailscale, hermes-gateway]
    # Bind to localhost only — Hermes refuses 0.0.0.0 (dashboard exposes
    # API keys without auth). caddy reverse-proxies hermes.local → :9119
    # in the same netns, so external access still works via caddy.
    command: ["hermes", "dashboard", "--host", "127.0.0.1", "--port", "9119"]
    volumes:
      - ./data/hermes:/root/.hermes
      - ./data/claude:/root/.claude
      - ./skills:/root/.hermes/skills/gnar:ro
    restart: unless-stopped

  # Cloudflare Tunnel connector — always on. Token-managed: the tunnel and
  # its public hostnames are configured in the Cloudflare Zero Trust
  # dashboard; the connector authenticates with CLOUDFLARED_TOKEN (set in
  # /srv/stack/.env). No cert.pem / config.yml needed. Not profile-gated,
  # so the boot `docker compose up -d --remove-orphans` keeps it alive.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gnar-cloudflared
    logging: *default-logging
    network_mode: service:tailscale
    depends_on: [tailscale, caddy]
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
    restart: unless-stopped
