# GNAR — minimal Hyprland config for an attached-display dashboard.
#
# When a display is plugged into the headless server, getty@tty1 auto-logs
# in and `~/.zprofile` exec's Hyprland. This config then full-screens a
# terminal running `btop` as a live system dashboard.
#
# To swap the dashboard, edit the `exec-once` line below — anything that
# runs in a terminal works (e.g. `tmux new -A -s dashboard`, `glances`,
# `gotop`, `wtfutil`).

monitor=,preferred,auto,1

input {
    kb_layout = us
    repeat_rate = 30
    repeat_delay = 250
}

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
    layout = dwindle
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# The dashboard — 4-pane tmux session with btop, services + Caddy
# sites, docker + pm2, and Claude Code metrics. See `gnar-dashboard`.
# `--override font_size=12` keeps four panes legible at 1080p; bump for
# bigger screens or older eyes.
exec-once = foot --fullscreen --override font_size=12 -e gnar-dashboard

# Keybindings — minimal, in case you walk up to the box with a keyboard.
$mod = SUPER
bind = $mod, RETURN, exec, foot
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod, F, fullscreen
