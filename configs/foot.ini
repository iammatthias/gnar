# GNAR — foot terminal config.
# Larger default font + zero-padding so the dashboard's four panes are
# legible from across the room and use as much screen as possible.
#
# JetBrainsMono Nerd Font has the box-drawing + powerline + icon glyphs
# btop / tmux / spaceship-prompt expect; falls back to monospace if not
# installed.

[main]
font=JetBrainsMono Nerd Font:size=14, monospace:size=14
pad=0x0
dpi-aware=auto

[colors]
alpha=1.0
# True black. foot's default background — and ANSI black (regular0) — is
# #242424, an off-black grey. On the kiosk dashboard that clashed with
# btop's panels and showed as visible seams between tmux panes. Pin both
# to #000000 so "black" reads as black everywhere.
background=000000
regular0=000000

[scrollback]
lines=10000
