# GNAR — mango config for an attached-display kiosk dashboard.
#
# When a display is plugged into the otherwise-headless server, getty@tty1
# auto-logs in, ~/.zprofile exec's mango, and this config composites the
# dashboard as six tiles — one foot window per gnar-board panel, laid out
# by mango's grid layout. The compositor owns the mosaic: gaps, borders,
# focus highlight, and window animations all come from the WM, and any
# tile can be swapped/zoomed/killed independently.
#
#   ┌ CPU ───┐┌ CONTAINERS ──────┐┌ NET ────┐
#   └────────┘│   (hero, tall)   ││ (tall,  │
#   ┌ MEM ───┐│                  ││  sites) │
#   │        │└ OPS ─────────────┘└─────────┘
#   └────────┘                    ┌ DISK ───┐
#                                 └─────────┘
#
#   columns by concern:  compute  │  services  │  i/o
#
# The tiles are borderless — Mango's own border + gap is the only frame,
# so each gnar-board panel renders edge-to-edge data under a header line.
# Each tile runs `gnar-board <panel>` (single-panel mode) in a respawn
# loop so a crash never leaves a hole in the mosaic. Panels only spawn
# the samplers they display, so six processes don't mean six pollers.
#
# Mango syntax: bind=MODIFIERS,KEY,DISPATCHER,ARGS
# Modifiers: SUPER, CTRL, ALT, SHIFT, NONE (combine with `+`).

# ----- theme: Tokyo Night to match gnar-board's palette -----
borderpx=2
focuscolor=0x7dcfffff
bordercolor=0x3b4261ff
gappih=10
gappiv=10
gappoh=14
gappov=14

# ----- tailored mosaic (sized for a 2560x1440 kiosk display) -----
#
# Each dashboard tile is a floating window pinned by windowrule, sized to
# content and grouped by concern into three columns:
#
#   compute   CPU  700×700  │ services CONTAINERS 1020×620 │ i/o  NET  760×680
#             MEM  700×700  │          OPS        1020×780 │      DISK 760×720
#
# Sized to content, not equal thirds (Tufte). Lists *cycle* (see paged())
# rather than stretching their tiles: CONTAINERS pages ~12 containers at a
# time with breathing room below, NET pages its 18-site list. OPS is the
# taller centre tile now — it absorbed the host-services + docker summary
# that used to crowd CONTAINERS, plus alerts/security/kanban/cron. Each
# column still sums to ~1400 so the top+bottom anchors meet at the seam.
# CPU keeps enough height for its rich per-core grid + top-procs (it
# collapses to a compact graph below ~600px).
#
# Width constraint (floats are centered/edge-anchored, so they can overlap):
# a side column of width W beside the centered middle of width C must keep
# W + C/2 <= 1280, else the side tile slides under the middle and clips.
# 760 + 1020/2 = 1270 — just inside. Don't widen these without shrinking C.
#
# Empirically (mango git, 2026-06): float offsetx/offsety behave as
# ANCHORS — a large negative value clamps to the left/top edge, 0
# centers, a large positive value clamps to the right/bottom edge.
# Widths/heights are pixels (or fractions <1). The 10px seams come
# from the sizes, not gap settings (floats ignore gaps). NOTE: editing
# windowrules needs a full mango restart (pkill mango) — reload_config
# accumulates duplicate rules in-session.
#
# On a different panel, delete these six rules to fall back to the
# resolution-independent grid layout below.
windowrule=isfloating:1,width:700,height:700,offsetx:-2000,offsety:-2000,appid:gnar-cpu
windowrule=isfloating:1,width:700,height:700,offsetx:-2000,offsety:2000,appid:gnar-mem
windowrule=isfloating:1,width:1020,height:620,offsetx:0,offsety:-2000,appid:gnar-containers
windowrule=isfloating:1,width:1020,height:780,offsetx:0,offsety:2000,appid:gnar-status
windowrule=isfloating:1,width:760,height:680,offsetx:2000,offsety:-2000,appid:gnar-net
windowrule=isfloating:1,width:760,height:720,offsetx:2000,offsety:2000,appid:gnar-disk

# Anything else on tag 1 (and the tiles themselves, if the mosaic rules
# above are removed) tiles in a grid. New windows append rather than
# becoming master, so spawn order is on-screen order.
tagrule=id:1,layout_name:grid
new_is_master=0

# ----- the six dashboard tiles -----
# gnar-kiosk-tiles spawns one foot per panel, serialized so the grid
# placement is deterministic (parallel launches map in race order).
exec-once=gnar-kiosk-tiles

# Keep the dashboard tiles on tag 1 wherever they (re)spawn.
windowrule=tags:1,appid:gnar-.*

# Walk-up keybindings (only matter if you have a keyboard plugged in).
# Following Mango's default style: ALT for app actions, SUPER for compositor.
bind=ALT,Return,spawn,foot
bind=ALT,Q,killclient
bind=SUPER,F,togglefullscreen
bind=SUPER,G,setlayout,grid
bind=SUPER,T,setlayout,tile
bind=SUPER,M,quit
bind=SUPER+SHIFT,R,reload_config
