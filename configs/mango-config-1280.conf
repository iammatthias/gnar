# GNAR — mango config for a SMALL attached display (≈1280x720), e.g. the
# rack touch LCD. Selected automatically by ~/.zprofile when the connected
# output is ≤1366 wide; the tuned 2560x1440 float mosaic lives in the
# sibling config.conf.
#
# There isn't room to hand-place six content-sized tiles on a 1280-wide
# panel, so this uses mango's GRID layout — it auto-tiles the six panels to
# whatever the screen is (3×2 here), resolution-independent. gnar-board's
# panels fall back to their compact layouts at this size, and the long
# lists cycle (CONTAINERS, SITES) — tap a tile to advance its page.
#
#   CPU   MEM         NET
#   DISK  CONTAINERS  OPS
#
# Touch: each tile is its own foot window, so a tap lands on one panel and
# advances that panel's paged view. gnar-board captures the pointer press;
# the compositor must deliver touch as pointer events for it to register.

# ----- theme: Tokyo Night, tighter gaps for the small panel -----
borderpx=2
focuscolor=0x7dcfffff
bordercolor=0x3b4261ff
gappih=6
gappiv=6
gappoh=8
gappov=8

# ----- grid layout (resolution-independent) -----
# No float windowrules: the six tiles tile into a grid auto-sized to the
# screen. new_is_master=0 + serialized spawn (gnar-kiosk-tiles) keeps the
# row-major order deterministic: cpu mem net / disk containers status.
tagrule=id:1,layout_name:grid
new_is_master=0

# ----- the six dashboard tiles -----
exec-once=gnar-kiosk-tiles
# Keep the dashboard tiles on tag 1 wherever they (re)spawn.
windowrule=tags:1,appid:gnar-.*

# Walk-up keybindings (only matter with a keyboard plugged in).
bind=ALT,Return,spawn,foot
bind=ALT,Q,killclient
bind=SUPER,F,togglefullscreen
bind=SUPER,G,setlayout,grid
bind=SUPER,T,setlayout,tile
bind=SUPER,M,quit
bind=SUPER+SHIFT,R,reload_config
