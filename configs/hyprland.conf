# GNAR — minimal Hyprland config for an attached-display kiosk dashboard.
#
# Hyprland only launches when a display is plugged into the otherwise
# headless server (see ~/.zprofile guard). getty@tty1 auto-logs in,
# ~/.zprofile exec's Hyprland, this config runs `gnar-dashboard` fullscreen.
#
# Kept intentionally bare — every directive here is one that's been stable
# across Hyprland versions for years. If you want to tune borders, animations,
# decorations, etc., add them after a successful boot, one at a time.

monitor=,preferred,auto,1

input {
    kb_layout = us
}

# Keybindings (only matter if you walk up to the box with a keyboard).
bind = SUPER, RETURN, exec, foot
bind = SUPER, Q, killactive
bind = SUPER, F, fullscreen
bind = SUPER SHIFT, R, exec, hyprctl reload
bind = SUPER SHIFT, E, exit

# Auto-launch the dashboard. `--maximized` is a foot CLI flag and works
# across compositors without needing a windowrule.
exec-once = foot --maximized -e gnar-dashboard
