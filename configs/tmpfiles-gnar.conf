# GNAR — systemd-tmpfiles rules, installed to /etc/tmpfiles.d/gnar.conf.
#
# RAPL energy counters default to 0400 (kernel hardening against
# power-analysis side channels — not a concern on a single-tenant home
# server). Open them read-only so gnar-board can show live CPU package
# wattage without root. Reapplied every boot by systemd-tmpfiles.
z /sys/class/powercap/intel-rapl:0/energy_uj 0444 - - -
