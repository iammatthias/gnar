# GNAR — mango config for an attached-display kiosk dashboard.
#
# When a display is plugged into the otherwise-headless server, getty@tty1
# auto-logs in, ~/.zprofile exec's mango, and this config composites the
# dashboard as six tiles — one foot window per gnar-board panel.
#
#   ┌ CPU ──┐┌ MEM ──┐┌ NET ──┐
#   └───────┘└───────┘└───────┘
#   ┌ DISK ─┐┌ CONT ─┐┌ OPS ──┐
#   └───────┘└───────┘└───────┘
#
# Layout is mango's GRID — the compositor tiles the six panels to FILL the
# screen, scaling to whatever resolution is plugged in (2560x1440 desk
# monitor, 1280x720 rack LCD, anything). No fixed pixel sizes, so no
# gutters or dead margins from a layout that doesn't add up to the screen.
# gnar-board's panels are responsive: they fill their tile with tables and
# compact sparklines, and long lists (containers, sites) cycle — tap a tile
# to advance (the rack screen is a touch panel).
#
# The tiles are borderless — Mango's own 2px border + gap is the only frame,
# so each panel renders edge-to-edge under a header line. Each runs
# `gnar-board <panel>` in a respawn loop so a crash never leaves a hole.
#
# Mango syntax: bind=MODIFIERS,KEY,DISPATCHER,ARGS  (SUPER/CTRL/ALT/SHIFT).

# ----- theme: Tokyo Night, tight gaps so the grid reads edge-to-edge -----
borderpx=2
focuscolor=0x7dcfffff
bordercolor=0x3b4261ff
gappih=6
gappiv=6
gappoh=8
gappov=8

# ----- grid layout (resolution-independent, fills the screen) -----
# new_is_master=0 + serialized spawn (gnar-kiosk-tiles) keeps grid order
# deterministic and row-major: cpu mem net / disk containers status.
tagrule=id:1,layout_name:grid
new_is_master=0

# ----- the six dashboard tiles -----
exec-once=gnar-kiosk-tiles
# Keep the dashboard tiles on tag 1 wherever they (re)spawn.
windowrule=tags:1,appid:gnar-.*

# Walk-up keybindings (only matter with a keyboard plugged in).
# ALT for app actions, SUPER for compositor (mango's default style).
bind=ALT,Return,spawn,foot
bind=ALT,Q,killclient
bind=SUPER,F,togglefullscreen
bind=SUPER,G,setlayout,grid
bind=SUPER,T,setlayout,tile
bind=SUPER,M,quit
bind=SUPER+SHIFT,R,reload_config

# ----- alternative: hand-tuned content-sized float mosaic (2560x1440) -----
# The grid above scales to any screen. If you ever want the old content-
# sized mosaic on a DEDICATED 2560x1440 panel (CONTAINERS hero, columns by
# concern), delete the `tagrule=...grid` line and uncomment these. They are
# fixed pixels (won't scale) and the float-overlap rule W + C/2 <= 1280
# applies. A full mango restart is needed to change windowrules.
#
# windowrule=isfloating:1,width:700,height:700,offsetx:-2000,offsety:-2000,appid:gnar-cpu
# windowrule=isfloating:1,width:700,height:700,offsetx:-2000,offsety:2000,appid:gnar-mem
# windowrule=isfloating:1,width:1020,height:620,offsetx:0,offsety:-2000,appid:gnar-containers
# windowrule=isfloating:1,width:1020,height:780,offsetx:0,offsety:2000,appid:gnar-status
# windowrule=isfloating:1,width:760,height:680,offsetx:2000,offsety:-2000,appid:gnar-net
# windowrule=isfloating:1,width:760,height:720,offsetx:2000,offsety:2000,appid:gnar-disk
