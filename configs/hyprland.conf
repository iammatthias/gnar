# GNAR — minimal Hyprland config for an attached-display kiosk dashboard.
#
# Hyprland only launches when a display is plugged into the otherwise
# headless server (see ~/.zprofile guard). getty@tty1 auto-logs in,
# ~/.zprofile exec's Hyprland, this config runs `gnar-dashboard` fullscreen.

monitor = , preferred, auto, 1

input {
    kb_layout = us
}

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
}

animations {
    enabled = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    background_color = 0xff000000
}

# Force every foot window fullscreen — more reliable than foot's --fullscreen
# CLI flag across Hyprland versions.
windowrule = fullscreen, class:^(foot)$

# Auto-launch the dashboard. `gnar-dashboard` is a tmux session with btop,
# services + Caddy sites, docker + pm2, and Claude Code metrics.
exec-once = foot -e gnar-dashboard

# Walk-up keybindings (only matter if you have a keyboard plugged in).
# Using literal SUPER instead of `$mod` to avoid any variable-parsing weirdness.
bind = SUPER,       RETURN, exec, foot
bind = SUPER,       Q,      killactive
bind = SUPER,       F,      fullscreen
bind = SUPER SHIFT, R,      exec, hyprctl reload
bind = SUPER SHIFT, E,      exit
